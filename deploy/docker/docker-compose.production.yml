services:
  jarvis:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    env_file:
      - ../env/openjarvis.production.env
    environment:
      - OPENJARVIS_ENGINE_DEFAULT=ollama
      - OLLAMA_HOST=http://ollama:11434
      - OPENJARVIS_PUBLIC_URL=https://${OPENJARVIS_DOMAIN}
      - OPENJARVIS_SECURE_COOKIES=1
      - OPENJARVIS_COOKIE_SAMESITE=lax
      - OPENJARVIS_ALLOWED_ORIGINS=https://${OPENJARVIS_DOMAIN}
      - OPENJARVIS_ALLOWED_HOSTS=${OPENJARVIS_DOMAIN}
      - OPENJARVIS_API_KEY_FILE=/run/secrets/openjarvis_api_key
    volumes:
      - openjarvis-data:/root/.openjarvis
    secrets:
      - openjarvis_api_key
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: unless-stopped
    networks:
      - openjarvis

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - openjarvis

  caddy:
    image: caddy:2
    depends_on:
      jarvis:
        condition: service_started
    environment:
      - OPENJARVIS_DOMAIN=${OPENJARVIS_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    restart: unless-stopped
    networks:
      - openjarvis

volumes:
  openjarvis-data:
  ollama-models:
  caddy-data:
  caddy-config:

secrets:
  openjarvis_api_key:
    file: ../env/secrets/openjarvis_api_key.txt

networks:
  openjarvis:
    driver: bridge
