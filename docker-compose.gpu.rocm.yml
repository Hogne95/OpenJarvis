# ROCm GPU override — use with:
#   docker compose -f docker-compose.yml -f docker-compose.gpu.rocm.yml up
version: "3.9"

services:
  jarvis:
    build:
      context: .
      dockerfile: Dockerfile.gpu.rocm
    devices:
      - /dev/kfd
      - /dev/dri
    group_add:
      - video
      - render
